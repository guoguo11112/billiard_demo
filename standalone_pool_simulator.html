    // =========================================================================
    // 4. KICKING SIMULATOR DRAWING COMPONENT

    function KickingInteractiveCanvas({ scenario }) {
      const canvasRef = useRef(null);
      const isDraggingRef = useRef(false);
      const [aimAngle, setAimAngle] = useState(0.4); // Initial aiming line pointing in radians
      const [isAnimating, setIsAnimating] = useState(false);
      const [animationFrame, setAnimationFrame] = useState(0);
      const animationTimerRef = useRef(null);

      const tableWidth = 720;
      const tableHeight = 360;
      const bRadius = 14; 

      // Reset state on scenario changes
      useEffect(() => {
        setAimAngle(scenario.id === 'k_sc_1' ? -0.4 : scenario.id === 'k_sc_2' ? -1.9 : -1.02);
        setIsAnimating(false);
        setAnimationFrame(0);
        if (animationTimerRef.current) clearInterval(animationTimerRef.current);
      }, [scenario]);

      // Simple click to trigger or update aim point
      const handleCanvasPointer = (e) => {
        if (isAnimating) return;
        const rect = canvasRef.current.getBoundingClientRect();
        const mouseX = ((e.clientX - rect.left) / rect.width) * tableWidth;
        const mouseY = ((e.clientY - rect.top) / rect.height) * tableHeight;

        // Calculate angle between cue ball and mouse click/drag position
        const dy = mouseY - scenario.cueBall.y;
        const dx = mouseX - scenario.cueBall.x;
        setAimAngle(Math.atan2(dy, dx));
      };

      const handlePointerDown = (e) => {
        isDraggingRef.current = true;
        handleCanvasPointer(e);
      };

      const handlePointerMove = (e) => {
        if (!isDraggingRef.current) return;
        handleCanvasPointer(e);
      };

      const handlePointerUp = () => {
        isDraggingRef.current = false;
      };

      const runKickingAnimation = () => {
        if (isAnimating) return;
        setIsAnimating(true);
        setAnimationFrame(0);

        let frame = 0;
        if (animationTimerRef.current) clearInterval(animationTimerRef.current);
        animationTimerRef.current = setInterval(() => {
          frame++;
          setAnimationFrame(frame);
          if (frame >= 70) {
            clearInterval(animationTimerRef.current);
            setIsAnimating(false);
          }
        }, 22);
      };

      // Math for path routing (1-cushion, 2-cushion, 3-cushion)
      const pathPoints = useMemo(() => {
        const start = scenario.cueBall;
        const points = [{ x: start.x, y: start.y }];
        let curX = start.x;
        let curY = start.y;
        let dx = Math.cos(aimAngle);
        let dy = Math.sin(aimAngle);

        const cushionDamping = 0.94; // Reflection velocity loss

        // Predict up to 4 cushion bounces
        for (let i = 0; i < 4; i++) {
          let tX = dx > 0 ? (tableWidth - bRadius - curX) / dx : (bRadius - curX) / dx;
          let tY = dy > 0 ? (tableHeight - bRadius - curY) / dy : (bRadius - curY) / dy;

          if (tX <= 0) tX = Infinity;
          if (tY <= 0) tY = Infinity;

          const t = Math.min(tX, tY);
          if (t === Infinity || t > 800) break;

          curX += dx * t;
          curY += dy * t;

          points.push({ x: curX, y: curY });

          // Hard cushion bounces
          if (tX < tY) {
            dx = -dx * cushionDamping;
          } else {
            dy = -dy * cushionDamping;
          }
        }

        return points;
      }, [aimAngle, scenario]);

      // Perform drawing logic inside canvas
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        // Clear canvas
        ctx.clearRect(0, 0, tableWidth, tableHeight);

        // Slate green cloth
        ctx.fillStyle = '#065f46'; // Emerald slate
        ctx.fillRect(0, 0, tableWidth, tableHeight);

        // Cushions
        ctx.fillStyle = '#047857';
        ctx.fillRect(0, 0, tableWidth, 16); // Top
        ctx.fillRect(0, tableHeight - 16, tableWidth, 16); // Bottom
        ctx.fillRect(0, 0, 16, tableHeight); // Left
        ctx.fillRect(tableWidth - 16, 0, 16, tableHeight); // Right

        // Draw diamond points (star dots)
        ctx.fillStyle = '#cbd5e1';
        for (let i = 1; i < 8; i++) {
          ctx.beginPath();
          ctx.arc(i * (tableWidth / 8), 8, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(i * (tableWidth / 8), tableHeight - 8, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }

        // Draw pockets (holes)
        ctx.fillStyle = '#0b1329';
        const pocketRadius = 18;
        const pocketPositions = [
          { x: 16, y: 16 }, { x: tableWidth / 2, y: 14 }, { x: tableWidth - 16, y: 16 },
          { x: 16, y: tableHeight - 16 }, { x: tableWidth / 2, y: tableHeight - 14 }, { x: tableWidth - 16, y: tableHeight - 16 }
        ];
        pocketPositions.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, pocketRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.lineWidth = 2;
          ctx.strokeStyle = '#d97706'; // Gold rim
          ctx.stroke();
        });

        // Obstacles
        ctx.fillStyle = '#be123c'; // Rose Red for blocking balls
        scenario.obstacleBalls.forEach(ob => {
          ctx.beginPath();
          ctx.arc(ob.x, ob.y, bRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#e11d48';
          const grad = ctx.createRadialGradient(ob.x - 3, ob.y - 3, 1, ob.x, ob.y, bRadius);
          grad.addColorStop(0, '#fda4af');
          grad.addColorStop(1, '#9f1239');
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.lineWidth = 1;
          ctx.strokeStyle = '#341212';
          ctx.stroke();
        });

        // Draw Target ball (Yellow 9 Ball)
        const targetBall = scenario.objectBall;
        ctx.beginPath();
        ctx.arc(targetBall.x, targetBall.y, bRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#eae308';
        ctx.fill();
        const objGrad = ctx.createRadialGradient(targetBall.x - 3, targetBall.y - 3, 1, targetBall.x, targetBall.y, bRadius);
        objGrad.addColorStop(0, '#fef08a');
        objGrad.addColorStop(1, '#d97706');
        ctx.fillStyle = objGrad;
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#5c3d03';
        ctx.stroke();
        ctx.fillStyle = '#0d0f12';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('9', targetBall.x, targetBall.y);

        // Rendering state transitions: static preview versus play
        if (!isAnimating) {
          // Render full predictable vector path
          ctx.beginPath();
          ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
          for (let i = 1; i < pathPoints.length; i++) {
            ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
          }
          ctx.strokeStyle = '#34d399';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 4]);
          ctx.stroke();
          ctx.setLineDash([]);

          // Draw aiming line source
          ctx.beginPath();
          ctx.arc(scenario.cueBall.x, scenario.cueBall.y, bRadius, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          const whiteGrad = ctx.createRadialGradient(scenario.cueBall.x - 3, scenario.cueBall.y - 3, 1, scenario.cueBall.x, scenario.cueBall.y, bRadius);
          whiteGrad.addColorStop(0, '#ffffff');
          whiteGrad.addColorStop(1, '#cbd5e1');
          ctx.fillStyle = whiteGrad;
          ctx.fill();
          ctx.lineWidth = 1.2;
          ctx.strokeStyle = '#94a3b8';
          ctx.stroke();
        } else {
          // Play slide bullet animation
          const totalDistance = pathPoints.reduce((acc, p, idx) => {
            if (idx === 0) return 0;
            const prev = pathPoints[idx - 1];
            return acc + Math.hypot(p.x - prev.x, p.y - prev.y);
          }, 0);

          const currentMultiplier = (animationFrame / 70);
          const currentProgressDist = totalDistance * currentMultiplier;

          // Find positioning coordinates along path
          let rolledDist = 0;
          let currentBallX = scenario.cueBall.x;
          let currentBallY = scenario.cueBall.y;

          for (let i = 1; i < pathPoints.length; i++) {
            const prev = pathPoints[i - 1];
            const curr = pathPoints[i];
            const segmentDist = Math.hypot(curr.x - prev.x, curr.y - prev.y);

            if (rolledDist + segmentDist >= currentProgressDist) {
              const segProgress = (currentProgressDist - rolledDist) / segmentDist;
              currentBallX = prev.x + (curr.x - prev.x) * segProgress;
              currentBallY = prev.y + (curr.y - prev.y) * segProgress;
              break;
            }
            rolledDist += segmentDist;
            if (i === pathPoints.length - 1) {
              currentBallX = curr.x;
              currentBallY = curr.y;
            }
          }

          // Draw the physical moving white cue ball
          ctx.beginPath();
          ctx.arc(currentBallX, currentBallY, bRadius, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          const whiteGrad = ctx.createRadialGradient(currentBallX - 3, currentBallY - 3, 1, currentBallX, currentBallY, bRadius);
          whiteGrad.addColorStop(0, '#ffffff');
          whiteGrad.addColorStop(1, '#e2e8f0');
          ctx.fillStyle = whiteGrad;
          ctx.fill();
          ctx.lineWidth = 1;
          ctx.strokeStyle = '#475569';
          ctx.stroke();
        }

      }, [scenario, aimAngle, pathPoints, isAnimating, animationFrame]);

      return (
        <div className="flex flex-col gap-4">
          <canvas 
            ref={canvasRef}
            width={tableWidth}
            height={tableHeight}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            className="w-full aspect-[2/1] rounded-xl shadow-inner cursor-pointer"
          />
          <div className="flex flex-col sm:flex-row justify-between items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-850">
            <div className="flex items-center gap-3 w-full sm:w-auto">
              <span className="text-[11px] text-slate-400 shrink-0 font-mono">微调指向角:</span>
              <input 
                type="range" 
                min="-3.14" 
                max="3.14" 
                step="0.01"
                value={aimAngle} 
                onChange={(e) => setAimAngle(parseFloat(e.target.value))} 
                className="w-full sm:w-48 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500"
              />
              <span className="text-[11px] font-mono text-emerald-400 font-bold shrink-0">{Math.round((aimAngle * 180) / Math.PI)}°</span>
            </div>
            
            <button 
              onClick={runKickingAnimation}
              disabled={isAnimating}
              className={`w-full sm:w-auto px-5 py-2 rounded-xl text-xs font-extrabold flex items-center justify-center gap-2 transition duration-200 ${
                isAnimating 
                  ? 'bg-slate-800 text-slate-500' 
                  : 'bg-emerald-500 cursor-pointer text-slate-950 hover:bg-emerald-400 hover:scale-[1.02]'
              }`}
            >
              <span>{isAnimating ? '仿真运动中...' : '⚡ 开启弹库出杆演示'}</span>
            </button>
          </div>
        </div>
      );
    }


    // =========================================================================
    // 5. AIMING SIMULATOR DRAWING COMPONENT
    // =========================================================================

    function AimingInteractiveCanvas({ scenario }) {
      const canvasRef = useRef(null);
      const [aimAngle, setAimAngle] = useState(-0.7);
      const [isAnimating, setIsAnimating] = useState(false);
      const [animationFrame, setAnimationFrame] = useState(0);
      const animationTimerRef = useRef(null);

      const tableWidth = 720;
      const tableHeight = 360;
      const bRadius = 14;

      // Sync state changes
      useEffect(() => {
        setAimAngle(scenario.id === 'a_sc_1' ? -0.22 : scenario.id === 'a_sc_2' ? -0.46 : -0.32);
        setIsAnimating(false);
        setAnimationFrame(0);
        if (animationTimerRef.current) clearInterval(animationTimerRef.current);
      }, [scenario]);

      const handleCanvasPointer = (e) => {
        if (isAnimating) return;
        const rect = canvasRef.current.getBoundingClientRect();
        const mouseX = ((e.clientX - rect.left) / rect.width) * tableWidth;
        const mouseY = ((e.clientY - rect.top) / rect.height) * tableHeight;

        const dy = mouseY - scenario.cueBall.y;
        const dx = mouseX - scenario.cueBall.x;
        setAimAngle(Math.atan2(dy, dx));
      };

      const runAimingAnimation = () => {
        if (isAnimating) return;
        setIsAnimating(true);
        setAnimationFrame(0);

        let frame = 0;
        if (animationTimerRef.current) clearInterval(animationTimerRef.current);
        animationTimerRef.current = setInterval(() => {
          frame++;
          setAnimationFrame(frame);
          if (frame >= 80) {
            clearInterval(animationTimerRef.current);
            setIsAnimating(false);
          }
        }, 20); // ~50fps, 1.6s
      };

      // Math calculating collisions / target ball vectors
      const physics = useMemo(() => {
        const start = scenario.cueBall;
        const obj = scenario.objectBall;
        const pocket = scenario.pocket;

        const dx = Math.cos(aimAngle);
        const dy = Math.sin(aimAngle);

        // Vector line cue ball to contact
        const vx = obj.x - start.x;
        const vy = obj.y - start.y;
        const dist = Math.hypot(vx, vy);

        // Closest point along cue line
        const dotProd = (vx * dx + vy * dy);
        let isCollision = false;
        let contactX = start.x + dx * 200;
        let contactY = start.y + dy * 200;
        let overlapRatio = 0.5;

        // Separation angle defaults
        let objTargetVector = { x: 1, y: 0 };
        let cueSeparationVector = { x: 1, y: 1 };

        if (dotProd > 0) {
          const px = start.x + dx * dotProd;
          const py = start.y + dy * dotProd;
          const perpDist = Math.hypot(obj.x - px, obj.y - py);

          if (perpDist < bRadius * 2) {
            // Collision is confirmed
            isCollision = true;
            const contactDist = Math.sqrt(Math.pow(bRadius * 2, 2) - Math.pow(perpDist, 2));
            const hitDist = dotProd - contactDist;

            contactX = start.x + dx * hitDist;
            contactY = start.y + dy * hitDist;

            // Geometry separation vectors
            const colNormalX = obj.x - contactX;
            const colNormalY = obj.y - contactY;
            const normalDist = Math.hypot(colNormalX, colNormalY);

            objTargetVector = {
              x: normalDist > 0 ? colNormalX / normalDist : 1,
              y: normalDist > 0 ? colNormalY / normalDist : 0
            };

            // Cue ball perpendicular post deflection
            cueSeparationVector = {
              x: -objTargetVector.y,
              y: objTargetVector.x
            };

            // Overlap fraction math
            overlapRatio = Math.max(0, 1 - (perpDist / (bRadius * 2)));
          }
        }

        return {
          isCollision,
          contactX,
          contactY,
          overlapRatio,
          objTargetVector,
          cueSeparationVector
        };
      }, [aimAngle, scenario]);

      // Render Loop
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const cbRadius = bRadius;
        const ballRadius = bRadius;

        // Clear and draw framework
        ctx.clearRect(0, 0, tableWidth, tableHeight);
        ctx.fillStyle = '#1e3a8a'; // Royal slate blue felt for aiming
        ctx.fillRect(0, 0, tableWidth, tableHeight);

        // Sides
        ctx.fillStyle = '#1e40af';
        ctx.fillRect(0, 0, tableWidth, 16);
        ctx.fillRect(0, tableHeight - 16, tableWidth, 16);
        ctx.fillRect(0, 0, 16, tableHeight);
        ctx.fillRect(tableWidth - 16, 0, 16, tableHeight);

        // Pockets
        ctx.fillStyle = '#0f172a';
        const pocketPositions = [
          { x: 16, y: 16 }, { x: tableWidth - 16, y: 16 },
          { x: 16, y: tableHeight - 16 }, { x: tableWidth - 16, y: tableHeight - 16 }
        ];
        if (scenario.pocket) {
          pocketPositions.push(scenario.pocket);
        }
        pocketPositions.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.lineWidth = 2.5;
          ctx.strokeStyle = '#f59e0b';
          ctx.stroke();
        });

        // Common utility to draw gradient balls
        const drawCueBall = (cx, cy, radius) => {
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          const grad = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, radius);
          grad.addColorStop(0, '#ffffff');
          grad.addColorStop(1, '#cbd5e1');
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.lineWidth = 1;
          ctx.strokeStyle = '#94a3b8';
          ctx.stroke();
        };

        const drawObjectBall = (ox, oy, radius) => {
          ctx.beginPath();
          ctx.arc(ox, oy, radius, 0, Math.PI * 2);
          ctx.fillStyle = '#eab308';
          ctx.fill();
          const objGrad = ctx.createRadialGradient(ox - 3, oy - 3, 1, ox, oy, radius);
          objGrad.addColorStop(0, '#fef08a');
          objGrad.addColorStop(1, '#d97706');
          ctx.fillStyle = objGrad;
          ctx.fill();
          ctx.lineWidth = 1.2;
          ctx.strokeStyle = '#b45309';
          ctx.stroke();

          ctx.fillStyle = '#020617';
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('9', ox, oy);
        };

        if (!isAnimating) {
          const start = scenario.cueBall;
          const obj = scenario.objectBall;

          // Draw aiming line
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(physics.contactX, physics.contactY);
          ctx.strokeStyle = '#38bdf8';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([3, 3]);
          ctx.stroke();
          ctx.setLineDash([]);

          // Draw virtual Ghost Ball (Shadow circle)
          if (physics.isCollision) {
            ctx.beginPath();
            ctx.arc(physics.contactX, physics.contactY, cbRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([2, 2]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw post-collision target vector path
            ctx.beginPath();
            ctx.moveTo(obj.x, obj.y);
            ctx.lineTo(obj.x + physics.objTargetVector.x * 120, obj.y + physics.objTargetVector.y * 120);
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          // Static positioning
          drawCueBall(start.x, start.y, cbRadius);
          drawObjectBall(obj.x, obj.y, ballRadius);
        } else {
          // Playing physics animation split logic
          const t = animationFrame / 80;
          const cb = scenario.cueBall;
          const obj = scenario.objectBall;

          if (physics.isCollision) {
            if (t <= 0.5) {
              const f = t * 2;
              const currentCueX = cb.x + (physics.contactX - cb.x) * f;
              const currentCueY = cb.y + (physics.contactY - cb.y) * f;

              // Moving cue and static object
              drawCueBall(currentCueX, currentCueY, cbRadius);
              drawObjectBall(obj.x, obj.y, ballRadius);
            } else {
              const f = (t - 0.5) * 2;
              const currentCueX = physics.contactX + physics.cueSeparationVector.x * 60 * f;
              const currentCueY = physics.contactY + physics.cueSeparationVector.y * 60 * f;

              const currentObjX = obj.x + physics.objTargetVector.x * 150 * f;
              const currentObjY = obj.y + physics.objTargetVector.y * 150 * f;

              drawCueBall(currentCueX, currentCueY, cbRadius);
              drawObjectBall(currentObjX, currentObjY, ballRadius);
            }
          } else {
            // Null collision misses
            const currentCueX = cb.x + Math.cos(aimAngle) * 300 * t;
            const currentCueY = cb.y + Math.sin(aimAngle) * 300 * t;

            drawCueBall(currentCueX, currentCueY, cbRadius);
            drawObjectBall(obj.x, obj.y, ballRadius);
          }
        }

      }, [scenario, aimAngle, physics, isAnimating, animationFrame]);

      return (
        <div className="flex flex-col gap-4">
          <canvas 
            ref={canvasRef}
            width={tableWidth}
            height={tableHeight}
            onPointerDown={handleCanvasPointer}
            onPointerMove={(e) => { if (e.buttons === 1) handleCanvasPointer(e); }}
            className="w-full aspect-[2/1] rounded-xl shadow-inner cursor-pointer"
          />
          <div className="flex flex-col sm:flex-row justify-between items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-850">
            <div className="flex items-center gap-3 w-full sm:w-auto">
              <span className="text-[11px] text-slate-400 shrink-0 font-mono">微调指向角:</span>
              <input 
                type="range" 
                min="-1.57" 
                max="0.4" 
                step="0.01"
                value={aimAngle} 
                onChange={(e) => setAimAngle(parseFloat(e.target.value))} 
                className="w-full sm:w-48 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-sky-500"
              />
              <span className="text-[11px] font-mono text-sky-400 font-bold shrink-0">{Math.round((aimAngle * 180) / Math.PI)}°</span>
            </div>
            
            <button 
              onClick={runAimingAnimation}
              disabled={isAnimating}
              className={`w-full sm:w-auto px-5 py-2 rounded-xl text-xs font-extrabold flex items-center justify-center gap-2 transition duration-200 ${
                isAnimating 
                  ? 'bg-slate-800 text-slate-500' 
                  : 'bg-sky-500 cursor-pointer text-slate-950 hover:bg-sky-400 hover:scale-[1.02]'
              }`}
            >
              <span>{isAnimating ? '几何碰撞释放中...' : '⚡ 播放影子碰撞动画'}</span>
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
